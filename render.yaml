services:
  - type: web
    name: job-finder-api
    env: docker
    dockerfilePath: Dockerfile.api
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-finder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: job-finder-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: job-finder-redis
          property: connectionString
      - key: DEVELOPMENT_MODE
        value: "false"

  # Celery Worker
  - type: worker
    name: job-finder-worker
    env: docker
    dockerfilePath: Dockerfile.celery
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-finder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: job-finder-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: job-finder-redis
          property: connectionString

databases:
  - name: job-finder-db
    plan: starter
    databaseName: job_agent

redis:
  - name: job-finder-redis
    plan: starter
