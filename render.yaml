services:
  - type: web
    name: job-finder-api
    env: docker
    dockerfilePath: Dockerfile.api
    plan: free
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-finder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: job-finder-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: job-finder-redis
          property: connectionString
      - key: DEVELOPMENT_MODE
        value: "false"

  # Celery Worker
  - type: worker
    name: job-finder-worker
    env: docker
    dockerfilePath: Dockerfile.celery
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: job-finder-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: job-finder-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: keyvalue
          name: job-finder-redis
          property: connectionString

  # Redis
  - type: keyvalue
    name: job-finder-redis
    plan: free
    ipAllowList: []

databases:
  - name: job-finder-db
    plan: free
    databaseName: job_agent
